name: mezz-issuance-radar

# 평일 18:30 KST (= 09:30 UTC) — DART 장마감 후 주요사항보고 집중 시간대 커버
on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # seen_rcept.json / bonds.jsonl 영속화 (best-effort 캐시)
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state
          key: mezz-state-${{ github.run_id }}
          restore-keys: |
            mezz-state-

      - name: Run radar (daily)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RADAR_LANG: en
        run: python pipeline.py --mode daily

      # 캘린더 CSV를 아티팩트로 보존 (선택)
      - name: Build 60d calendar
        if: always()
        run: python pipeline.py --mode calendar || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-output-${{ github.run_id }}
          path: |
            mezzanine_calendar_*.csv
            state/bonds.jsonl
          if-no-files-found: ignore
